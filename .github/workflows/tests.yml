---
name: Molecule CI
'on':
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Molecule
    runs-on: ubuntu-latest

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@v6

      # see https://docs.astral.sh/uv/guides/integration/github/#installation
      # see https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: 3.14

      - name: Install test dependencies.
        run: uv sync --all-extras

      - name: Install test dependencies.
        run: |
          uv run ansible-galaxy role install -r requirements.yml --force
          uv run ansible-galaxy collection install -r requirements.yml --force

      - name: Env
        run: |
          uv run python --version
          uv run molecule --version

      - name: all debian13 based tests
        run: |
          uv run molecule test --no-parallel --destroy always --all -e ubuntu_common -e k3s
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: debian13

      - name: all ubuntu24 based tests
        run: |
          uv run molecule test --no-parallel --destroy always --all  -e k3s -e debian_common -e proxmox_install -e proxmox_backup_server
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          MOLECULE_DISTRO: ubuntu2404
