---
# see https://ansible.readthedocs.io/projects/lint/configuring/#ansible-lint-configuration
profile: null

exclude_paths:
  - molecule/
  - .ansible/
  - .venv/
  - .github/
  - "**/files/**"
  - "**/templates/**"
  - collections/

skip_list:
  - yaml[line-length]
  - galaxy[no-runtime]
  - galaxy[no-changelog]
  - galaxy[version-incorrect]
  - schema[galaxy]
  - yaml[empty-lines]
